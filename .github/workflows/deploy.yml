name: Deploy Cron Jobs Service to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: "mysql://user:password@localhost:3306/dummy"

      - name: Build TypeScript
        run: |
          pnpm exec esbuild src/index.ts --bundle --platform=node --target=node22 --external:@aws-sdk/* --external:@prisma/client --outfile=dist/index.js

      - name: Package Lambda (Zip)
        run: |
          cp -r node_modules/.prisma/client/* dist/
          cd dist
          zip -r function.zip .
          mv function.zip ../

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_CRON_FUNCTION_NAME }} \
            --zip-file fileb://function.zip